<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ Colorful QuoteSpark | Random Quote Generator</title>
  
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quote-container">
  <div class="quote-card" id="quoteCard">
    <div class="quote-icon">
      <i class="fas fa-quote-left"></i>
    </div>
    <div class="quote-text" id="quoteText">
      “The only limit is your imagination.”
    </div>
    <div class="author" id="authorText">
      <i class="fas fa-feather-alt"></i> Unknown
    </div>
    <div class="button-group">
      <button class="btn btn-primary" id="newQuoteBtn">
        <i class="fas fa-sync-alt"></i> New Quote
      </button>
      <button class="btn btn-outline" id="shareQuoteBtn">
        <i class="fas fa-share-alt"></i> Share
      </button>
    </div>
    <div class="emoji-floating">
      <span>✨</span> <span>📖</span> <span>💡</span> <span>🌈</span>
    </div>
  </div>
  <div class="credit">
    🌟 Random Quote Generator · endless inspiration · <i class="fas fa-heart" style="color:#ff9999;"></i> 
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
